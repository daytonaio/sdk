loaders:
  - type: python
    search_path: ["src/daytona_sdk"]

processors:
  - type: filter
  - type: smart
  - type: crossref

renderer:
  type: docusaurus
  docs_base_path: ./../../docs/python-sdk
  relative_output_path: .
  relative_sidebar_path: sidebar.json
  sidebar_top_level_label: "API Reference"
  markdown:
    render_toc: true
    render_module_header: true
    descriptive_class_title: true
    signature_in_header: true
    signature_with_def: true
    toc_maxlevel: 4
    toc_href_format: '{path}#{slug}'
    headers_level:
      '1': '#'
      '2': '##'
      '3': '###'
    descriptive_module_title: true
    render_module_headline_links: true
    insert_header_anchors: false
    signature_code_block: true
    use_fixed_header_levels: true
    code_headers: true
    render_typehints: true
    method_headers_as_code: false
    classdef_code_block: true
    docstringstyle: 'google'